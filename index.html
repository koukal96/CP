<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONTROLPOINT | DOPRAVNÍ SPOLEČNOST</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="grid-bg"></div>

    <header class="mobile-nav">
        <img src="IMG_8852.png" alt="CONTROLPOINT" class="m-logo">
    </header>

    <main class="dashboard">
        <section class="hero-mini">
            <div class="status"><span class="blink"></span> SYSTEM_LIVE</div>
            <h1>CONTROL<span class="red">POINT</span></h1>
            <p class="sub">VY OBJEDNÁTE, MY DOVEZEME.</p>
        </section>

        <section class="tech-stats">
            <div class="stat-box">
                <div class="num counter" data-target="1520000">0</div>
                <div class="lab">KM_LOGGED</div>
            </div>
            <div class="stat-box">
                <div class="num">200<span class="red">kW</span></div>
                <div class="lab">HUB_CAPACITY</div>
            </div>
        </section>

        <section class="partners-flow">
            <div class="flow-track">
                <span>SCANIA</span>
                <span>SCHMITZ CARGOBULL</span>
                <span>VOLVO</span>
                <span>KRONE</span>
                <span>SCANIA</span>
                <span>SCHMITZ CARGOBULL</span>
            </div>
        </section>

        <section class="hub-preview">
            <div class="hub-card">
                <div class="loader">⚡</div>
                <h3>200kW_HUB</h3>
                <p>PŘIPRAVUJEME_VĚROVANY_94</p>
                <div class="bar"><div class="fill"></div></div>
            </div>
        </section>

        <section class="contact-terminal">
            <a href="https://maps.google.com" class="btn-gps">SPUSTIT_NAVIGACI</a>
            <div class="contact-footer">
                <p>info@control-point.eu</p>
                <p>+420 601 371 211</p>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
